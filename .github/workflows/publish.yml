name: Publish to PyPI

# Runs when a GitHub Release is published (e.g. tag v0.1.0).
# Uses PyPI "trusted publishing": no tokens or secrets are stored anywhere.
# One-time setup on pypi.org is described in PUBLISHING.md.

on:
  release:
    types: [published]

jobs:
  tests:
    uses: ./.github/workflows/test.yml

  publish:
    needs: [tests]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
